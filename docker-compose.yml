version: '3.8'

services:
  # 1. PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: safegame_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Safegame Node.js Server
  app-server:
    image: dldcom/safegame-server:latest
    container_name: safegame_server
    restart: always
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@database:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - database
    volumes:
      - ./server/public/uploads:/usr/src/app/public/uploads

  # 3. Safegame React Client
  client:
    image: dldcom/safegame-client:latest
    container_name: safegame_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app-server
    volumes:
      - ./server/public/uploads:/usr/share/nginx/html/uploads

volumes:
  pg_data:
